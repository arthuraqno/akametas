<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0B1629">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AKA Metas">
<title>AKA Metas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Crimson+Pro:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#0B1629;
  --navy2:#122040;
  --navy3:#1C2E52;
  --gold:#C9A84C;
  --gold-light:#F5EDD6;
  --cream:#F0EDE8;
  --cream2:#E8E4DC;
  --green:#1A7A58;
  --green-light:#E8F5EE;
  --red:#8B2020;
  --red-light:#FDECEC;
  --amber:#8B5E1A;
  --amber-light:#FDF3E0;
  --surface:#FAFAF8;
  --surface2:#F3F1EC;
  --border:#DDD9D0;
  --border2:#C8C2B6;
  --text:#0B1629;
  --text2:#4A5568;
  --text3:#8896A6;
  --r:12px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:"Jost",sans-serif;background:var(--cream);color:var(--text);overscroll-behavior:none}
input,button,textarea,select{font-family:"Jost",sans-serif}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{background:var(--navy);padding:env(safe-area-inset-top,16px) 20px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--navy3)}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo img{width:36px;height:36px;border-radius:6px;object-fit:cover}
.hdr-logo-text{display:flex;flex-direction:column;line-height:1}
.hdr-logo-aka{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:600;color:var(--cream);letter-spacing:0.08em}
.hdr-logo-sub{font-size:9px;font-weight:300;color:var(--text3);letter-spacing:0.18em;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.notif-btn{position:relative;background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;display:flex;padding:2px}
.notif-btn:hover{color:#fff}
.notif-dot{position:absolute;top:1px;right:1px;width:7px;height:7px;background:var(--gold);border-radius:50%;border:1.5px solid var(--navy)}
.hdr-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.25);color:var(--cream);background:var(--navy3);letter-spacing:0.05em}

/* TABS */
.tabs{display:flex;background:var(--navy);border-bottom:1px solid var(--navy3);flex-shrink:0}
.tab{flex:1;padding:13px 2px;text-align:center;font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:0.06em;text-transform:uppercase;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:20px 16px 100px;-webkit-overflow-scrolling:touch}

/* LOGIN */
#login{display:flex;flex-direction:column;flex:1;overflow-y:auto;background:var(--navy)}
.login-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px 32px;text-align:center}
.login-logo{width:110px;height:110px;border-radius:16px;object-fit:cover;margin-bottom:24px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.login-hero h1{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:600;color:var(--cream);letter-spacing:0.06em;margin-bottom:6px}
.login-hero p{font-size:13px;font-weight:300;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}
.login-divider{width:40px;height:1px;background:var(--gold);margin:20px auto}
.login-bottom{background:var(--cream);border-radius:24px 24px 0 0;padding:28px 20px calc(32px + env(safe-area-inset-bottom,0px))}
.login-label{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text2);margin-bottom:14px;font-weight:500}
.socio-btn{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer;transition:all .18s}
.socio-btn:active{background:var(--cream2);border-color:var(--navy)}
.s-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:15px;font-weight:600;letter-spacing:0.05em;border:1px solid var(--border2)}
.s-av.a{background:var(--navy);color:var(--cream)}
.s-av.b{background:var(--navy2);color:var(--cream)}
.s-av.c{background:var(--navy3);color:var(--cream)}
.s-info p{font-size:15px;font-weight:500;color:var(--text);font-family:"Crimson Pro",serif;letter-spacing:0.02em}
.s-info span{font-size:11px;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase}

/* SECTION TITLE */
.sec-title{font-family:"Cormorant Garamond",serif;font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text2);margin-bottom:12px;margin-top:4px}

/* PROGRESS */
.prog-box{background:#fff;border-radius:var(--r);padding:16px 18px;margin-bottom:16px;border:1px solid var(--border)}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.prog-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);font-weight:500}
.prog-pct{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:700;color:var(--navy)}
.prog-track{background:var(--cream2);border-radius:20px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:var(--navy);transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-fill.full{background:var(--green)}
.prog-sub{font-size:11px;color:var(--text2);margin-top:7px;font-weight:300;letter-spacing:0.03em}

/* META CARD */
.meta-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;transition:all .2s}
.meta-card.done-card{border-color:#A8D4BC;background:#FDFFFE}
.meta-top{display:flex;align-items:center;gap:12px}
.chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;transition:all .2s}
.chk.ok{background:var(--navy);border-color:var(--navy);color:var(--cream)}
.chk.ok-opt{background:var(--navy3);border-color:var(--navy3);color:var(--cream)}
.m-emoji{font-size:20px;flex-shrink:0}
.m-name{font-family:"Crimson Pro",serif;font-size:16px;font-weight:500;flex:1;color:var(--text);letter-spacing:0.01em}
.m-name.s{text-decoration:line-through;color:var(--text3)}
.badge{font-size:9px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:0.07em;text-transform:uppercase}
.b-ok{background:var(--green-light);color:var(--green)}
.b-pend{background:var(--amber-light);color:var(--amber)}
.b-opt{background:var(--cream2);color:var(--text2)}
.meta-ft{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:flex;align-items:center;gap:8px}
.cam-btn{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--navy);background:var(--cream2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase}
.cam-btn:disabled{opacity:.3;cursor:not-allowed}
.proof-thumb{width:40px;height:40px;object-fit:cover;border-radius:6px;cursor:pointer;margin-left:auto;border:1px solid var(--border)}
.no-photo{font-size:11px;color:var(--text3);margin-left:auto;letter-spacing:0.03em}

/* AGUA */
.agua-ctrl{display:flex;align-items:center;gap:10px;margin-top:12px}
.agua-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:400;flex-shrink:0;color:var(--navy)}
.agua-dots{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.wdot{width:15px;height:15px;border-radius:50%;background:var(--cream2);border:1px solid var(--border);transition:all .25s}
.wdot.f1{background:#3B7DD8;border-color:#2860B8}
.wdot.f2{background:var(--green);border-color:#156648}
.agua-lbl{font-size:11px;color:var(--text2);margin-top:6px;font-weight:300;letter-spacing:0.04em}

/* EQUIPE */
.team-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.team-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.team-name{font-family:"Crimson Pro",serif;font-size:17px;font-weight:500;color:var(--text)}
.team-sub{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em}
.team-track{background:var(--cream2);border-radius:20px;height:4px;overflow:hidden;margin-bottom:12px}
.team-fill{height:100%;border-radius:20px;background:var(--navy);transition:width .3s}
.team-fill.full{background:var(--green)}
.team-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--border);font-size:13px;font-family:"Crimson Pro",serif}
.t-chk{width:18px;height:18px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}
.t-chk.ok{background:var(--navy);border-color:var(--navy);color:#fff}
.t-photo{width:26px;height:26px;object-fit:cover;border-radius:4px;margin-left:auto;cursor:pointer;border:1px solid var(--border)}

/* CALENDARIO */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-header h3{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:600;color:var(--navy);letter-spacing:0.04em}
.cal-nav{background:none;border:1px solid var(--border);border-radius:6px;font-size:16px;cursor:pointer;color:var(--navy);padding:5px 10px;display:flex;align-items:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-dow{text-align:center;font-size:9px;font-weight:500;color:var(--text3);padding:5px 0;letter-spacing:0.1em;text-transform:uppercase}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;font-family:"Jost",sans-serif}
.cal-day.empty{background:transparent;cursor:default;border:none}
.cal-day.future{background:transparent;color:var(--text3);cursor:default;border:none}
.cal-day.today{border-color:var(--navy);color:var(--navy);font-weight:700}
.cal-day.perfect{background:var(--green-light);color:var(--green)}
.cal-day.partial{background:var(--amber-light);color:var(--amber)}
.cal-day.missed{background:var(--red-light);color:var(--red)}
.cal-day.selected{box-shadow:0 0 0 2px var(--navy);z-index:1}
.cal-dot{position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5}
.cal-detail{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:8px}
.cal-detail-date{font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:600;color:var(--navy);margin-bottom:12px;letter-spacing:0.04em}
.cal-meta-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px solid var(--border);font-size:13px;font-family:"Crimson Pro",serif}
.cal-chk{width:18px;height:18px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.cal-chk.ok{background:var(--green);border-color:var(--green);color:#fff}
.cal-chk.no{background:var(--red-light);border-color:#DBA0A0;color:var(--red)}

/* NOTIFICACOES */
.notif-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;gap:12px}
.notif-card.unread{border-left:3px solid var(--navy);background:#FAFBFF}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--cream2);border:1px solid var(--border)}
.notif-body p{font-family:"Crimson Pro",serif;font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.4}
.notif-body span{font-size:10px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase}
.notif-empty{text-align:center;padding:48px 20px;color:var(--text3)}
.notif-empty i{font-size:36px;margin-bottom:12px;display:block;opacity:.3}
.notif-empty p{font-family:"Cormorant Garamond",serif;font-size:16px}

/* FAB */
.fab{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom,0px));right:20px;width:54px;height:54px;border-radius:50%;background:var(--navy);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:24px;box-shadow:0 4px 20px rgba(11,22,41,.35)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(8,14,28,.7);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--cream);border-radius:20px 20px 0 0;padding:24px 20px calc(32px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px}
.modal h3{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:600;margin-bottom:18px;color:var(--navy);letter-spacing:0.04em}
.minput{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:15px;color:var(--text);background:#fff;margin-bottom:10px;outline:none;font-family:"Crimson Pro",serif}
.minput:focus{border-color:var(--navy)}
.modal-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.btn-cancel{flex:1;padding:13px;border:1px solid var(--border2);border-radius:var(--r-sm);background:none;cursor:pointer;font-size:14px;color:var(--text2);font-weight:500;letter-spacing:0.05em}
.btn-save{flex:1;padding:13px;border:none;border-radius:var(--r-sm);background:var(--navy);cursor:pointer;font-size:14px;color:var(--cream);font-weight:500;letter-spacing:0.06em;text-transform:uppercase}

/* PHOTO FS */
.photo-fs{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;align-items:center;justify-content:center;cursor:pointer}
.photo-fs.open{display:flex}
.photo-fs img{max-width:92vw;max-height:85vh;border-radius:10px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text2);gap:10px;font-size:13px;letter-spacing:0.05em;text-transform:uppercase}
.spinner{width:18px;height:18px;border:1.5px solid var(--border2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy);color:var(--cream);padding:10px 22px;border-radius:20px;font-size:12px;font-weight:500;letter-spacing:0.06em;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;text-transform:uppercase}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LEGEND */
.legend{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

input[type=file]{display:none}
</style>
</head>

<script>
const SUPA_URL="https://jemgznvexybmwblukfod.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplbWd6bnZleHlibXdibHVrZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NDYxMTUsImV4cCI6MjA5NDEyMjExNX0.p2YYi4EyqhveW2B88MjiGo8VCh6SPWrwV8ICcUSUqmU";

async function dbQ(table,filters={}){let q=sb.from(table).select("*");for(const[k,v]of Object.entries(filters))q=q.eq(k,v);const{data,error}=await q;if(error)console.error(error);return data||[]}
async function dbUpsert(table,obj,conflict){const{data,error}=await sb.from(table).upsert(obj,{onConflict:conflict}).select();if(error)console.error(error);return data}
async function dbInsert(table,obj){const{data,error}=await sb.from(table).insert(obj).select();if(error)console.error(error);return data}
async function uploadFoto(file,path){const{data,error}=await sb.storage.from("fotos").upload(path,file,{upsert:true});if(error){console.error(error);return null}const{data:pub}=sb.storage.from("fotos").getPublicUrl(path);return pub.publicUrl}

async function login(uid){
  cu=SOCIOS.find(s=>s.id===uid);

function logout(){cu=null;document.getElementById("main").style.display="none";document.getElementById("login").style.display="flex";document.getElementById("hdr-right").style.display="none"}

function switchTab(t){
  for(let i=0;i<4;i++){document.getElementById("t"+i).className="tab"+(t===i?" active":"");document.getElementById("v"+i).style.display=t===i?"block":"none"}

  if(t===0)renderMetas();else if(t===1)renderEquipe();else if(t===2)renderCalendario();else renderNotifs();

async function renderMetas(){
  const el=document.getElementById("v0");
  el.innerHTML=`<div class="loading"><div class="spinner"></div>Carregando</div>`;
  const regs=await dbQ("registros",{usuario_id:cu.id,data:today()});
  const regMap={};regs.forEach(r=>{regMap[r.meta_id]=r});
  const obrig=metas.filter(m=>!m.opcional&&!m.is_agua);
  const done=obrig.filter(m=>regMap[m.id]&&regMap[m.id].cumprida).length;
  const pct=obrig.length?Math.round(done/obrig.length*100):0;
  const full=pct===100;
  let h=`<div class="prog-box">
    <div class="prog-top"><span class="prog-label">Progresso de Hoje</span><span class="prog-pct">${pct}<span style="font-size:16px;font-weight:400">%</span></span></div>
    <div class="prog-track"><div class="prog-fill${full?" full":""}" style="width:${pct}%"></div></div>
    <p class="prog-sub">${done} de ${obrig.length} metas obrigatórias concluídas</p>
  </div><p class="sec-title">Metas do Dia</p>`;
  for(const m of metas){
    if(m.is_agua){h+=buildAgua(m,regMap[m.id]);continue}
    const r=regMap[m.id]||{};const isDone=!!r.cumprida,hasPhoto=!!r.foto_url;
    const badge=isDone?`<span class="badge b-ok">Feito</span>`:m.opcional?`<span class="badge b-opt">Opcional</span>`:`<span class="badge b-pend">Pendente</span>`;
    const chkCls=isDone?(m.opcional?"ok-opt":"ok"):"";
    h+=`<div class="meta-card${isDone?" done-card":""}">
      <div class="meta-top">
        <button class="chk ${chkCls}" onclick="toggleMeta('${m.id}')">${isDone?'<i class="ti ti-check" style="font-size:12px"></i>':""}</button>
        <span class="m-emoji">${m.emoji}</span>
        <span class="m-name${isDone?" s":""}">${m.nome}</span>${badge}
      </div>
      <div class="meta-ft">
        <button class="cam-btn" onclick="reqPhoto('${m.id}')" ${isDone?"":"disabled"}><i class="ti ti-camera"></i>${hasPhoto?"Trocar":"Foto"}</button>
        ${hasPhoto?`<img class="proof-thumb" src="${r.foto_url}" onclick="showPhoto('${r.foto_url}')" alt="foto">`:`<span class="no-photo">${isDone?"⚠ sem foto":"–"}</span>`}
      </div>
    </div>`;
  }
  el.innerHTML=h;
  const bm=document.getElementById("abtn-m"),bp=document.getElementById("abtn-p");
  if(bm)bm.onclick=()=>changeAgua(-500);
  if(bp)bp.onclick=()=>changeAgua(500);
}

function buildAgua(m,reg){
  const ml=(reg&&reg.ml_agua)||0,m1=2000,m2=3500,step=500,dots=7;
  let dd="";for(let i=0;i<dots;i++){const v=(i+1)*step;let c="wdot";if(v<=ml)c+=v<=m1?" f1":" f2";dd+=`<div class="${c}"></div>`}
  const lbl=ml>=m2?"3,5L atingido":ml>=m1?`2L ok — faltam ${((m2-ml)/1000).toFixed(1)}L`:` ${(ml/1000).toFixed(1)}L / meta 2L`;
  const badge=ml>=m2?`<span class="badge b-ok">3,5L</span>`:ml>=m1?`<span class="badge b-ok">2L</span>`:`<span class="badge b-pend">Pendente</span>`;
  return `<div class="meta-card${ml>=m1?" done-card":""}">
    <div class="meta-top">
      <button class="chk${ml>=m1?" ok":""}" style="pointer-events:none">${ml>=m1?'<i class="ti ti-check" style="font-size:12px"></i>':""}</button>
      <span class="m-emoji">💧</span><span class="m-name">Água</span>${badge}
    </div>
    <div class="agua-ctrl">
      <button class="agua-btn" id="abtn-m">−</button>
      <div class="agua-dots">${dd}</div>
      <button class="agua-btn" id="abtn-p">+</button>
    </div>
    <p class="agua-lbl">${lbl} · cada bolinha = 500ml</p>
  </div>`;
}

async function toggleMeta(metaId){
  const regs=await dbQ("registros",{usuario_id:cu.id,meta_id:metaId,data:today()});
  const reg=regs[0]||{};
  await dbUpsert("registros",{usuario_id:cu.id,meta_id:metaId,data:today(),cumprida:!reg.cumprida,foto_url:reg.foto_url||null,ml_agua:0},"usuario_id,meta_id,data");
  renderMetas();
}
async function changeAgua(delta){
  const regs=await dbQ("registros",{usuario_id:cu.id,meta_id:"agua",data:today()});
  const reg=regs[0]||{ml_agua:0};
  const ml=Math.max(0,Math.min(3500,(reg.ml_agua||0)+delta));
  await dbUpsert("registros",{usuario_id:cu.id,meta_id:"agua",data:today(),cumprida:ml>=2000,ml_agua:ml,foto_url:null},"usuario_id,meta_id,data");
  renderMetas();
}
async function reqPhoto(metaId){
  const regs=await dbQ("registros",{usuario_id:cu.id,meta_id:metaId,data:today()});
  if(!regs[0]||!regs[0].cumprida)return;
  pendingMeta=metaId;document.getElementById("file-input").click();
}
async function handlePhoto(e){
  const file=e.target.files[0];if(!file||!pendingMeta)return;
  showToast("Enviando foto...");
  const path=`${cu.id}/${today()}/${pendingMeta}_${Date.now()}`;
  const url=await uploadFoto(file,path);
  if(url){
    const regs=await dbQ("registros",{usuario_id:cu.id,meta_id:pendingMeta,data:today()});
    const reg=regs[0]||{};
    await dbUpsert("registros",{usuario_id:cu.id,meta_id:pendingMeta,data:today(),cumprida:true,foto_url:url,ml_agua:reg.ml_agua||0},"usuario_id,meta_id,data");
    showToast("Foto salva!");renderMetas();
  }
  pendingMeta=null;e.target.value="";
}
function showPhoto(url){document.getElementById("photo-fs-img").src=url;document.getElementById("photo-fs").className="photo-fs open"}

async function renderEquipe(){
  const el=document.getElementById("v1");
  el.innerHTML=`<div class="loading"><div class="spinner"></div>Carregando</div>`;
  const todayRegs=await dbQ("registros",{data:today()});
  let h=`<p class="sec-title">Progresso de Hoje</p>`;
  for(const s of SOCIOS){
    const mRegs=todayRegs.filter(r=>r.usuario_id===s.id);
    const regMap={};mRegs.forEach(r=>{regMap[r.meta_id]=r});
    const obrig=metas.filter(m=>!m.opcional&&!m.is_agua);
    const done=obrig.filter(m=>regMap[m.id]&&regMap[m.id].cumprida).length;
    const pct=obrig.length?Math.round(done/obrig.length*100):0;
    const agua=(regMap["agua"]&&regMap["agua"].ml_agua)||0;
    let rows="";
    for(const m of metas){
      if(m.is_agua){rows+=`<div class="team-row"><div class="t-chk${agua>=2000?" ok":""}"></div><span>${m.emoji} ${m.nome}</span><span style="margin-left:auto;font-size:11px;color:var(--text2)">${(agua/1000).toFixed(1)}L</span></div>`;continue}
      const r=regMap[m.id]||{};const isDone=!!r.cumprida;
      rows+=`<div class="team-row"><div class="t-chk${isDone?" ok":""}"></div><span style="color:${isDone?"var(--text)":"var(--text3)"}">${m.emoji} ${m.nome}</span>${r.foto_url?`<img class="t-photo" src="${r.foto_url}" onclick="showPhoto('${r.foto_url}')" alt="foto">`:isDone?`<span style="font-size:10px;color:var(--amber);margin-left:auto">sem foto</span>`:""}</div>`;
    }
    h+=`<div class="team-card">
      <div class="team-hdr">
        <div class="s-av ${s.c}" style="width:40px;height:40px;font-size:13px">${s.s}</div>
        <div style="flex:1"><p class="team-name">${s.n}</p><p class="team-sub">${done} de ${obrig.length} concluídas</p></div>
        <span style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:${pct===100?"var(--green)":"var(--navy)"}">${pct}%</span>
      </div>
      <div class="team-track"><div class="team-fill${pct===100?" full":""}" style="width:${pct}%"></div></div>
      ${rows}
    </div>`;
  }
  el.innerHTML=h;
}

async function renderCalendario(){
  const el=document.getElementById("v2");
  el.innerHTML=`<div class="loading"><div class="spinner"></div>Carregando</div>`;
  const now=new Date();
  if(!calYear){calYear=now.getFullYear();calMonth=now.getMonth()}
  const firstDay=new Date(calYear,calMonth,1).toISOString().slice(0,10);
  const lastDay=new Date(calYear,calMonth+1,0).toISOString().slice(0,10);
  const{data:regs}=await sb.from("registros").select("*").eq("usuario_id",cu.id).gte("data",firstDay).lte("data",lastDay);
  calRegistros={};
  (regs||[]).forEach(r=>{if(!calRegistros[r.data])calRegistros[r.data]={};calRegistros[r.data][r.meta_id]=r});
  const mNames=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const dows=["D","S","T","Q","Q","S","S"];
  const start=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=today();
  const obrig=metas.filter(m=>!m.opcional&&!m.is_agua);
  let h=`<div class="cal-header">
    <button class="cal-nav" onclick="calNav(-1)"><i class="ti ti-chevron-left"></i></button>
    <h3>${mNames[calMonth]} ${calYear}</h3>
    <button class="cal-nav" onclick="calNav(1)"><i class="ti ti-chevron-right"></i></button>
  </div><div class="cal-grid">`;
  dows.forEach(d=>{h+=`<div class="cal-dow">${d}</div>`});
  for(let i=0;i<start;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isFuture=ds>todayStr,isToday=ds===todayStr,isSel=ds===calSelected;
    let cls="cal-day";
    if(isFuture)cls+=" future";
    else{
      const dr=calRegistros[ds]||{};
      const dn=obrig.filter(m=>dr[m.id]&&dr[m.id].cumprida).length;
      if(!obrig.length)cls+=" future";
      else if(dn===obrig.length)cls+=" perfect";
      else if(dn>0)cls+=" partial";
      else cls+=" missed";
    }
    if(isToday)cls+=" today";if(isSel)cls+=" selected";
    h+=`<div class="${cls}" ${isFuture?"":` onclick="calSelect('${ds}')"`}>${d}${!isFuture?"<div class='cal-dot'></div>":""}</div>`;
  }
  h+=`</div>`;
  if(calSelected){
    const dr=calRegistros[calSelected]||{};
    const[y,mo,dd]=calSelected.split("-");
    h+=`<div class="cal-detail"><p class="cal-detail-date">${parseInt(dd)} de ${mNames[parseInt(mo)-1]} de ${y}</p>`;
    for(const m of metas){
      const r=dr[m.id]||{};const isDone=!!r.cumprida;
      h+=`<div class="cal-meta-row"><div class="cal-chk${isDone?" ok":" no"}">${isDone?'<i class="ti ti-check"></i>':'<i class="ti ti-x"></i>'}</div><span style="color:${isDone?"var(--text)":"var(--text3)"}">${m.emoji} ${m.nome}${m.is_agua&&r.ml_agua?" ("+((r.ml_agua/1000).toFixed(1))+"L)":""}</span>${r.foto_url?`<img style="width:24px;height:24px;object-fit:cover;border-radius:4px;margin-left:auto;cursor:pointer" src="${r.foto_url}" onclick="showPhoto('${r.foto_url}')">`:""}</div>`;
    }
    h+=`</div>`;
  }
  h+=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-light);border:1px solid #A8D4BC"></div>Tudo feito</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--amber-light);border:1px solid #E8C98A"></div>Parcial</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red-light);border:1px solid #E0AAAA"></div>Nenhuma</div>
  </div>`;
  el.innerHTML=h;
}
function calNav(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--}if(calMonth>11){calMonth=0;calYear++}calSelected=null;renderCalendario()}
function calSelect(ds){calSelected=calSelected===ds?null:ds;renderCalendario()}

async function renderNotifs(){
  const el=document.getElementById("v3");
  el.innerHTML=`<div class="loading"><div class="spinner"></div>Carregando</div>`;
  await sb.from("notificacoes").update({lida:true}).eq("lida",false);
  document.getElementById("notif-dot").style.display="none";
  const{data:notifs}=await sb.from("notificacoes").select("*").order("criada_em",{ascending:false}).limit(50);
  if(!notifs||!notifs.length){el.innerHTML=`<div class="notif-empty"><i class="ti ti-bell-off"></i><p>Nenhum aviso ainda</p></div>`;return}
  let h=`<p class="sec-title">Avisos Recentes</p>`;
  for(const n of notifs){
    const dt=new Date(n.criada_em);const rel=formatRel(dt);
    const ico=n.tipo==="meta_nova"?"📌":n.tipo==="lembrete"?"⏰":"✅";
    h+=`<div class="notif-card${n.lida?"":" unread"}"><div class="notif-icon">${ico}</div><div class="notif-body"><p>${n.mensagem}</p><span>${rel}</span></div></div>`;
  }
  el.innerHTML=h;
}
function formatRel(dt){const diff=Date.now()-dt.getTime(),m=Math.floor(diff/60000);if(m<1)return"agora";if(m<60)return m+"min atrás";const h=Math.floor(m/60);if(h<24)return h+"h atrás";return Math.floor(h/24)+"d atrás"}
async function checkNotifDot(){const{data}=await sb.from("notificacoes").select("id").eq("lida",false).limit(1);document.getElementById("notif-dot").style.display=(data&&data.length)?"block":"none"}
async function criarNotif(tipo,msg){await dbInsert("notificacoes",{tipo,mensagem:msg,lida:false});document.getElementById("notif-dot").style.display="block"}

function openModal(){document.getElementById("modal-ov").className="overlay open"}
function closeModal(){document.getElementById("modal-ov").className="overlay";document.getElementById("m-nome").value="";document.getElementById("m-emoji").value="";document.getElementById("m-opt").checked=false}
async function saveMeta(){
  const nome=document.getElementById("m-nome").value.trim();if(!nome)return;
  const emoji=document.getElementById("m-emoji").value.trim()||"📌";
  const opcional=document.getElementById("m-opt").checked;
  const id="m"+Date.now();
  await dbInsert("metas",{id,emoji,nome,opcional,is_agua:false,ativa:true});
  await criarNotif("meta_nova",`Nova meta adicionada por ${cu.n}: "${emoji} ${nome}"`);
  metas=await dbQ("metas",{ativa:true});
  closeModal();showToast("Meta adicionada!");renderMetas();
}

setInterval(async()=>{
  if(!cu)return;
  const regs=await dbQ("registros",{usuario_id:cu.id,data:today()});
  const regMap={};regs.forEach(r=>{regMap[r.meta_id]=r});
  const pendentes=metas.filter(m=>!m.opcional&&!m.is_agua&&(!regMap[m.id]||!regMap[m.id].cumprida));
  if(pendentes.length>0){
    await criarNotif("lembrete",`${cu.n}, metas pendentes: ${pendentes.map(m=>m.nome).join(", ")}`);
  }
},3*60*60*1000);

const mf={name:"AKA Metas",short_name:"AKA Metas",start_url:"./",display:"standalone",background_color:"#0B1629",theme_color:"#0B1629"};

if("serviceWorker" in navigator){const sw=`self.addEventListener("install",e=>{self.skipWaiting()});self.addEventListener("activate",e=>{self.clients.claim()});self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request).catch(()=>new Response("offline")))});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"text/javascript"})),{scope:"./"}).catch(()=>{})}
</script>
